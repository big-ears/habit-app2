<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="몸길 마음길 이정표">
<title>몸길 마음길 이정표</title>
<link rel="apple-touch-icon" href="./cat.png">
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f7f7f7;
    --bg3: #efefef;
    --border: #e0e0e0;
    --border2: #c8c8c8;
    --text: #111111;
    --text2: #666666;
    --text3: #aaaaaa;
    --shadow: 0 2px 0 #d0d0d0;
    --shadow-sm: 0 1px 0 #d8d8d8;
    --accent: #111111;
    --red: #cc2222;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    padding-bottom: 72px;
  }

  .filter-bar {
    display: flex;
    gap: 0;
    padding: 0 20px;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 1px solid var(--border);
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-bar button {
    flex-shrink: 0;
    padding: 10px 14px;
    border: none;
    border-bottom: 2px solid transparent;
    background: transparent;
    color: var(--text3);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.03em;
    margin-bottom: -1px;
  }
  .filter-bar button.active {
    color: var(--text);
    border-bottom-color: var(--text);
  }

  main { padding: 20px; }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--text3);
    text-transform: uppercase;
    margin: 20px 0 10px;
  }
  .section-label:first-child { margin-top: 0; }

  /* 카드 공통 */
  .habit-card, .lang-card {
    background: var(--bg);
    border: 1.5px solid var(--text);
    box-shadow: var(--shadow);
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .habit-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; letter-spacing: -0.2px; }
  .habit-desc { font-size: 12px; color: var(--text2); line-height: 1.65; }
  .card-actions { display: flex; gap: 6px; margin-top: 10px; }

  .btn-edit, .btn-del {
    font-size: 11px;
    font-weight: 500;
    padding: 5px 12px;
    border: 1px solid var(--border2);
    background: var(--bg);
    box-shadow: var(--shadow-sm);
    cursor: pointer;
    color: var(--text2);
    letter-spacing: 0.02em;
  }
  .btn-del { color: var(--red); border-color: var(--red); }
  .btn-edit:active { background: var(--bg3); box-shadow: none; transform: translateY(1px); }
  .btn-del:active { background: #fff0f0; box-shadow: none; transform: translateY(1px); }

  /* 언어교체 카드 */
  .lang-old { font-size: 12px; color: var(--red); margin-bottom: 4px; }
  .lang-arrow { font-size: 10px; color: var(--text3); margin-bottom: 4px; letter-spacing: 0.05em; }
  .lang-new { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
  .lang-why {
    font-size: 11px;
    color: var(--text2);
    padding-top: 8px;
    border-top: 1px solid var(--border);
    line-height: 1.6;
  }

  /* 추가 버튼 */
  .add-btn {
    width: 100%;
    padding: 12px;
    border: 1.5px dashed var(--border2);
    background: transparent;
    color: var(--text3);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 4px;
    letter-spacing: 0.05em;
  }
  .add-btn:active { background: var(--bg2); }

  /* 모달 */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg);
    border-top: 2px solid var(--text);
    padding: 20px 20px 40px;
    width: 100%;
    max-width: 480px;
  }
  .modal h3 { font-size: 15px; font-weight: 700; margin-bottom: 16px; letter-spacing: -0.3px; }
  .modal label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 5px;
    margin-top: 14px;
  }
  .modal input, .modal textarea, .modal select {
    width: 100%;
    background: var(--bg);
    border: 1.5px solid var(--border2);
    padding: 10px 12px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    border-radius: 0;
    -webkit-appearance: none;
  }
  .modal textarea { resize: none; height: 68px; line-height: 1.5; }
  .modal input:focus, .modal textarea:focus, .modal select:focus { border-color: var(--text); }
  .modal-btns { display: flex; gap: 8px; margin-top: 18px; }
  .btn-cancel {
    flex: 1; padding: 12px;
    border: 1.5px solid var(--border2);
    background: var(--bg);
    box-shadow: var(--shadow-sm);
    color: var(--text2); font-size: 13px; font-weight: 500; cursor: pointer;
  }
  .btn-save {
    flex: 2; padding: 12px;
    border: 1.5px solid var(--text);
    background: var(--text);
    box-shadow: var(--shadow);
    color: #fff; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .btn-cancel:active { box-shadow: none; transform: translateY(1px); }
  .btn-save:active { box-shadow: none; transform: translateY(1px); }

  /* 바텀 탭 */
  .bottom-tab {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--bg);
    border-top: 1.5px solid var(--text);
    display: flex;
    padding: 0 0 20px;
  }
  .tab-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 10px 0 0;
    color: var(--text3);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.04em;
  }
  .tab-item.active { color: var(--text); }
  .tab-dot {
    width: 4px; height: 4px;
    background: var(--text);
    border-radius: 50%;
    margin-bottom: 2px;
    opacity: 0;
  }
  .tab-item.active .tab-dot { opacity: 1; }

  .page { display: none; }
  .page.active { display: block; }

  .empty { color: var(--text3); font-size: 13px; padding: 24px 0; text-align: center; letter-spacing: 0.03em; }
  .cat-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .paw-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 8px
