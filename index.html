<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>몸길 마음길 이정표</title>
<style>
  body { font-family: sans-serif; margin: 0; padding: 0; }
  header { height: 90px; border-bottom: 2px solid #000; display: flex; align-items: center; padding: 0 20px; position: relative; }
  #header-cat-btn { height: 80px; position: absolute; right: 20px; cursor: pointer; }
  .page { display: none; padding: 20px; }
  .page.active { display: block; }
  .btn { padding: 10px; margin: 5px; cursor: pointer; }
  .bottom-tab { position: fixed; bottom: 0; width: 100%; display: flex; border-top: 1px solid #000; background: #fff; }
  .tab-item { flex: 1; padding: 15px; text-align: center; border: none; background: none; cursor: pointer; }
</style>
</head>
<body>

<header>
  <h1>몸길 마음길 이정표</h1>
  <img id="header-cat-btn" src="./cat2.png" alt="Cat" onclick="toggleSoundMode()">
</header>

<div id="page-habits" class="page active">
  <button class="btn" onclick="playRandomMeow()">전체</button>
  <div id="habits-list">습관 리스트 영역</div>
  <button class="btn" onclick="playRandomMeow()">+ 추가</button>
</div>

<div id="page-language" class="page">
  <button class="btn" onclick="playRandomMeow()">+ 패턴 추가</button>
</div>

<nav class="bottom-tab">
  <button class="tab-item" onclick="playRandomMeow(); switchPage('habits')">행동습관</button>
  <button class="tab-item" onclick="playRandomMeow(); switchPage('language')">언어교체</button>
</nav>

<script>
  let isSoundOn = true;
  const sounds = [new Audio('./cat_a1.mp3'), new Audio('./cat_a2.mp3'), new Audio('./cat_a3.mp3'), new Audio('./cat_a4.mp3'), new Audio('./cat_a5.mp3')];

  function toggleSoundMode() {
    isSoundOn = !isSoundOn;
    document.getElementById('header-cat-btn').style.opacity = isSoundOn ? "1" : "0.3";
  }

  function playRandomMeow() {
    if (!isSoundOn) return;
    const s = sounds[Math.floor(Math.random() * sounds.length)];
    s.currentTime = 0;
    s.play().catch(e => console.log("소리 재생 실패"));
  }

  function switchPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + pageId).classList.add('active');
  }
</script>

</body>
</html>
