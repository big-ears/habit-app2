<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f0f0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="습관">
<title>나의 습관</title>
<style>
  :root {
    --bg: #0f0f0f;
    --bg2: #1a1a1a;
    --bg3: #242424;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #f0ede8;
    --text2: #8a8680;
    --text3: #5a5652;
    --teal: #1D9E75;
    --teal-bg: rgba(29,158,117,0.12);
    --red: #A32D2D;
    --red-bg: rgba(163,45,45,0.12);
    --accent: #1D9E75;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    padding-bottom: 80px;
  }
  header {
    padding: 56px 20px 20px;
    border-bottom: 0.5px solid var(--border);
  }
  header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
  header p { font-size: 13px; color: var(--text2); margin-top: 4px; }

  nav {
    display: flex;
    gap: 6px;
    padding: 16px 20px 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  nav::-webkit-scrollbar { display: none; }
  nav button {
    flex-shrink: 0;
    padding: 7px 14px;
    border-radius: 20px;
    border: 0.5px solid var(--border2);
    background: transparent;
    color: var(--text2);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  nav button.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 500;
  }

  main { padding: 20px; }

  .section-title {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    color: var(--text3);
    text-transform: uppercase;
    margin: 24px 0 10px;
  }
  .section-title:first-child { margin-top: 0; }

  /* 행동습관 카드 */
  .habit-card {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 8px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .habit-icon {
    font-size: 18px;
    min-width: 28px;
    text-align: center;
    padding-top: 1px;
  }
  .habit-content { flex: 1; min-width: 0; }
  .habit-title { font-size: 14px; font-weight: 500; margin-bottom: 3px; }
  .habit-desc { font-size: 12px; color: var(--text2); line-height: 1.6; }
  .habit-actions { display: flex; gap: 6px; margin-top: 8px; }
  .btn-edit, .btn-del {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 6px;
    border: 0.5px solid var(--border2);
    background: transparent;
    cursor: pointer;
    color: var(--text2);
    transition: all 0.15s;
  }
  .btn-del { color: var(--red); border-color: rgba(163,45,45,0.3); }
  .btn-edit:active { background: var(--bg3); }
  .btn-del:active { background: var(--red-bg); }

  /* 언어교체 카드 */
  .lang-card {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 8px;
  }
  .lang-old { font-size: 13px; color: #E24B4A; margin-bottom: 6px; }
  .lang-arrow { font-size: 11px; color: var(--text3); margin-bottom: 6px; }
  .lang-new { font-size: 13px; color: var(--teal); font-weight: 500; margin-bottom: 6px; }
  .lang-why { font-size: 11px; color: var(--text3); padding-top: 6px; border-top: 0.5px solid var(--border); }
  .lang-actions { display: flex; gap: 6px; margin-top: 8px; }

  /* 추가 버튼 */
  .add-btn {
    width: 100%;
    padding: 12px;
    border-radius: var(--radius);
    border: 0.5px dashed var(--border2);
    background: transparent;
    color: var(--text2);
    font-size: 13px;
    cursor: pointer;
    margin-top: 4px;
    transition: all 0.15s;
  }
  .add-btn:active { background: var(--bg3); }

  /* 모달 */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2);
    border-radius: 20px 20px 0 0;
    padding: 20px;
    width: 100%;
    max-width: 480px;
    padding-bottom: 40px;
  }
  .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
  .modal label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 5px; margin-top: 12px; }
  .modal input, .modal textarea {
    width: 100%;
    background: var(--bg3);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
  }
  .modal textarea { resize: none; height: 70px; line-height: 1.5; }
  .modal input:focus, .modal textarea:focus { border-color: var(--accent); }
  .modal-btns { display: flex; gap: 8px; margin-top: 16px; }
  .btn-cancel {
    flex: 1; padding: 12px; border-radius: var(--radius-sm);
    border: 0.5px solid var(--border2); background: transparent;
    color: var(--text2); font-size: 14px; cursor: pointer;
  }
  .btn-save {
    flex: 2; padding: 12px; border-radius: var(--radius-sm);
    border: none; background: var(--accent);
    color: #fff; font-size: 14px; font-weight: 500; cursor: pointer;
  }

  /* 바텀 탭 */
  .bottom-tab {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--bg2);
    border-top: 0.5px solid var(--border);
    display: flex;
    padding: 8px 0 20px;
  }
  .tab-item {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; gap: 3px;
    background: transparent; border: none; cursor: pointer;
    padding: 6px 0;
    color: var(--text3);
    font-size: 10px;
    transition: color 0.15s;
  }
  .tab-item.active { color: var(--accent); }
  .tab-icon { font-size: 22px; line-height: 1; }

  .page { display: none; }
  .page.active { display: block; }

  /* 오늘의 다짐 */
  .affirmation-box {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 0 var(--radius) var(--radius) 0;
    padding: 16px;
    margin-bottom: 16px;
    font-size: 14px;
    line-height: 1.7;
    color: var(--text2);
    font-style: italic;
  }
  .affirmation-name { font-size: 12px; color: var(--text3); margin-top: 8px; font-style: normal; }
  .empty { color: var(--text3); font-size: 13px; padding: 20px 0; text-align: center; }
</style>
</head>
<body>

<header>
  <h1>나의 습관</h1>
  <p id="today-date"></p>
</header>

<div id="page-habits" class="page active">
  <nav>
    <button class="active" onclick="filterHabits('all', this)">전체</button>
    <button onclick="filterHabits('body', this)">몸과 공간</button>
    <button onclick="filterHabits('speech', this)">말과 태도</button>
    <button onclick="filterHabits('consume', this)">선택과 소비</button>
  </nav>
  <main>
    <div id="habits-list"></div>
    <button class="add-btn" onclick="openHabitModal()">+ 행동습관 추가</button>
  </main>
</div>

<div id="page-language" class="page">
  <main>
    <div class="section-title">언어 교체 훈련</div>
    <div id="lang-list"></div>
    <button class="add-btn" onclick="openLangModal()">+ 언어 패턴 추가</button>
  </main>
</div>

<div id="page-today" class="page">
  <main>
    <div class="section-title">오늘의 다짐</div>
    <div class="affirmation-box">
      "덕이 없으면 덕이 있는 척이라도 하라.<br>그래서 좀 더 나은 사람이 되기 위해, 오늘도 한 걸음."
      <div class="affirmation-name">— 공자, 그리고 나</div>
    </div>
    <div class="section-title">오늘 실천할 습관 (랜덤 3가지)</div>
    <div id="today-picks"></div>
    <button class="add-btn" style="margin-top:12px" onclick="refreshToday()">↻ 다시 뽑기</button>
  </main>
</div>

<!-- 행동습관 모달 -->
<div class="modal-overlay" id="habit-modal">
  <div class="modal">
    <h3 id="habit-modal-title">행동습관 추가</h3>
    <label>아이콘 (이모지 하나)</label>
    <input id="h-icon" type="text" maxlength="2" placeholder="예: 🧘">
    <label>제목</label>
    <input id="h-title" type="text" placeholder="예: 자세와 시선">
    <label>설명</label>
    <textarea id="h-desc" placeholder="구체적인 실천 방법을 적어요"></textarea>
    <label>분류</label>
    <select id="h-cat" style="width:100%;background:var(--bg3);border:0.5px solid var(--border2);border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;outline:none;">
      <option value="body">몸과 공간</option>
      <option value="speech">말과 태도</option>
      <option value="consume">선택과 소비</option>
    </select>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('habit-modal')">취소</button>
      <button class="btn-save" onclick="saveHabit()">저장</button>
    </div>
  </div>
</div>

<!-- 언어교체 모달 -->
<div class="modal-overlay" id="lang-modal">
  <div class="modal">
    <h3 id="lang-modal-title">언어 패턴 추가</h3>
    <label>기존 언어 (감정 모드)</label>
    <input id="l-old" type="text" placeholder="예: 나는 왜 이렇게 못하지">
    <label>교체 언어 (탐색 모드)</label>
    <input id="l-new" type="text" placeholder="예: 내가 과소평가한 게 뭐지?">
    <label>왜 효과적인가</label>
    <textarea id="l-why" placeholder="이 교체가 왜 도움이 되는지 적어요"></textarea>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('lang-modal')">취소</button>
      <button class="btn-save" onclick="saveLang()">저장</button>
    </div>
  </div>
</div>

<nav class="bottom-tab">
  <button class="tab-item active" onclick="switchPage('habits', this)">
    <span class="tab-icon">🪴</span>
    <span>행동습관</span>
  </button>
  <button class="tab-item" onclick="switchPage('language', this)">
    <span class="tab-icon">💬</span>
    <span>언어교체</span>
  </button>
  <button class="tab-item" onclick="switchPage('today', this)">
    <span class="tab-icon">☀️</span>
    <span>오늘</span>
  </button>
</nav>

<script>
const DEFAULT_HABITS = [
  { id: 1, icon: '🪑', title: '자세와 시선', desc: '등받이에 기대지 않고, 걸을 때 시선이 약간 위를 향함. 몸이 먼저 인상을 만든다.', cat: 'body' },
  { id: 2, icon: '🌿', title: '일관된 향기', desc: '비싼 향수보다 같은 향을 꾸준히. 그 사람만의 인상은 반복에서 생긴다.', cat: 'body' },
  { id: 3, icon: '🗂️', title: '보이지 않는 공간 정돈', desc: '가방 안, 지갑, 책상. 남이 안 보는 곳이 기준선이 된다.', cat: 'body' },
  { id: 4, icon: '🤫', title: '말이 느리고 적다', desc: '급하게 설명하거나 과하게 웃지 않음. 침묵을 불편해하지 않는다.', cat: 'speech' },
  { id: 5, icon: '👂', title: '끝까지 듣기', desc: '상대 말이 끝나기 전에 끼어들지 않음. 이것만으로도 인상이 달라진다.', cat: 'speech' },
  { id: 6, icon: '🌑', title: '불평은 조용히', desc: '불만이 있어도 공개적으로 드러내지 않음. 해결하거나 침묵한다.', cat: 'speech' },
  { id: 7, icon: '📦', title: '적게, 오래, 잘', desc: '많이 갖기보다 선택한 것을 오래 쓴다. 소비보다 경험에 투자.', cat: 'consume' },
];

const DEFAULT_LANGS = [
  { id: 1, old: '나는 왜 이렇게 못하지', next: '내가 과소평가한 게 뭐지?', why: '\'나\'가 아닌 \'상황\'을 겨냥. 자기비하를 분석으로 전환.' },
  { id: 2, old: '완전히 망쳤어', next: '어느 지점에서 판단이 틀렸지?', why: '전체 실패를 특정 결정 지점으로 좁혀, 수정 가능한 단위로 만듦.' },
  { id: 3, old: '다들 나를 어떻게 볼까', next: '이게 나한테 뭘 가르치려는 거지?', why: '외부 시선에서 내부 학습으로 초점 이동.' },
  { id: 4, old: '또 실패했어', next: '이 패턴이 몇 번째지? 왜 반복되지?', why: '감정적 자책을 패턴 인식으로 전환.' },
  { id: 5, old: '이건 내 한계야', next: '지금 이 시점의 한계야. 뭐가 부족했지?', why: '고정된 나 → 현재 좌표. 성장 가능성을 언어 안에 내포.' },
];

let habits = JSON.parse(localStorage.getItem('habits') || 'null') || DEFAULT_HABITS;
let langs = JSON.parse(localStorage.getItem('langs') || 'null') || DEFAULT_LANGS;
let editingHabitId = null;
let editingLangId = null;
let currentFilter = 'all';

function save() {
  localStorage.setItem('habits', JSON.stringify(habits));
  localStorage.setItem('langs', JSON.stringify(langs));
}

function nextId(arr) {
  return arr.length ? Math.max(...arr.map(x => x.id)) + 1 : 1;
}

// 날짜
const d = new Date();
document.getElementById('today-date').textContent =
  d.getFullYear() + '년 ' + (d.getMonth()+1) + '월 ' + d.getDate() + '일';

// 페이지 전환
function switchPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'today') refreshToday();
}

// 행동습관 렌더
function filterHabits(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderHabits();
}

function renderHabits() {
  const list = document.getElementById('habits-list');
  const filtered = currentFilter === 'all' ? habits : habits.filter(h => h.cat === currentFilter);
  if (!filtered.length) { list.innerHTML = '<p class="empty">아직 습관이 없어요</p>'; return; }
  list.innerHTML = filtered.map(h => `
    <div class="habit-card">
      <div class="habit-icon">${h.icon}</div>
      <div class="habit-content">
        <div class="habit-title">${h.title}</div>
        <div class="habit-desc">${h.desc}</div>
        <div class="habit-actions">
          <button class="btn-edit" onclick="editHabit(${h.id})">수정</button>
          <button class="btn-del" onclick="deleteHabit(${h.id})">삭제</button>
        </div>
      </div>
    </div>
  `).join('');
}

function openHabitModal(id) {
  editingHabitId = id || null;
  const modal = document.getElementById('habit-modal');
  if (id) {
    const h = habits.find(x => x.id === id);
    document.getElementById('habit-modal-title').textContent = '행동습관 수정';
    document.getElementById('h-icon').value = h.icon;
    document.getElementById('h-title').value = h.title;
    document.getElementById('h-desc').value = h.desc;
    document.getElementById('h-cat').value = h.cat;
  } else {
    document.getElementById('habit-modal-title').textContent = '행동습관 추가';
    document.getElementById('h-icon').value = '';
    document.getElementById('h-title').value = '';
    document.getElementById('h-desc').value = '';
    document.getElementById('h-cat').value = 'body';
  }
  modal.classList.add('open');
}

function editHabit(id) { openHabitModal(id); }

function saveHabit() {
  const icon = document.getElementById('h-icon').value.trim() || '✦';
  const title = document.getElementById('h-title').value.trim();
  const desc = document.getElementById('h-desc').value.trim();
  const cat = document.getElementById('h-cat').value;
  if (!title) return;
  if (editingHabitId) {
    const h = habits.find(x => x.id === editingHabitId);
    h.icon = icon; h.title = title; h.desc = desc; h.cat = cat;
  } else {
    habits.push({ id: nextId(habits), icon, title, desc, cat });
  }
  save(); closeModal('habit-modal'); renderHabits();
}

function deleteHabit(id) {
  if (!confirm('삭제할까요?')) return;
  habits = habits.filter(h => h.id !== id);
  save(); renderHabits();
}

// 언어교체 렌더
function renderLangs() {
  const list = document.getElementById('lang-list');
  if (!langs.length) { list.innerHTML = '<p class="empty">아직 언어 패턴이 없어요</p>'; return; }
  list.innerHTML = langs.map(l => `
    <div class="lang-card">
      <div class="lang-old">✕ "${l.old}"</div>
      <div class="lang-arrow">↓ 이렇게 바꾸면</div>
      <div class="lang-new">✓ "${l.next}"</div>
      <div class="lang-why">${l.why}</div>
      <div class="lang-actions">
        <button class="btn-edit" onclick="editLang(${l.id})">수정</button>
        <button class="btn-del" onclick="deleteLang(${l.id})">삭제</button>
      </div>
    </div>
  `).join('');
}

function openLangModal(id) {
  editingLangId = id || null;
  if (id) {
    const l = langs.find(x => x.id === id);
    document.getElementById('lang-modal-title').textContent = '언어 패턴 수정';
    document.getElementById('l-old').value = l.old;
    document.getElementById('l-new').value = l.next;
    document.getElementById('l-why').value = l.why;
  } else {
    document.getElementById('lang-modal-title').textContent = '언어 패턴 추가';
    document.getElementById('l-old').value = '';
    document.getElementById('l-new').value = '';
    document.getElementById('l-why').value = '';
  }
  document.getElementById('lang-modal').classList.add('open');
}

function editLang(id) { openLangModal(id); }

function saveLang() {
  const old = document.getElementById('l-old').value.trim();
  const next = document.getElementById('l-new').value.trim();
  const why = document.getElementById('l-why').value.trim();
  if (!old || !next) return;
  if (editingLangId) {
    const l = langs.find(x => x.id === editingLangId);
    l.old = old; l.next = next; l.why = why;
  } else {
    langs.push({ id: nextId(langs), old, next, why });
  }
  save(); closeModal('lang-modal'); renderLangs();
}

function deleteLang(id) {
  if (!confirm('삭제할까요?')) return;
  langs = langs.filter(l => l.id !== id);
  save(); renderLangs();
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

// 오늘 페이지
function refreshToday() {
  const picks = document.getElementById('today-picks');
  const all = [...habits];
  const chosen = all.sort(() => Math.random() - 0.5).slice(0, Math.min(3, all.length));
  if (!chosen.length) { picks.innerHTML = '<p class="empty">습관을 먼저 추가해요</p>'; return; }
  picks.innerHTML = chosen.map(h => `
    <div class="habit-card">
      <div class="habit-icon">${h.icon}</div>
      <div class="habit-content">
        <div class="habit-title">${h.title}</div>
        <div class="habit-desc">${h.desc}</div>
      </div>
    </div>
  `).join('');
}

// 모달 바깥 클릭 닫기
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});

renderHabits();
renderLangs();
</script>
</body>
